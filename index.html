<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi Decimal Generator & Autoclicker</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 32px;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
      text-align: center;
    }
    h1 {
      font-size: 1.8rem;
      color: #38bdf8;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 24px;
    }
    .stats-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 24px;
    }
    .stat-box {
      background: #0f172a;
      padding: 12px 24px;
      border-radius: 10px;
      border: 1px solid #334155;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #38bdf8;
    }
    .stat-label {
      font-size: 0.8rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .pi-display-wrapper {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 20px;
      max-height: 250px;
      overflow-y: auto;
      margin-bottom: 28px;
      word-break: break-all;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.25rem;
      line-height: 1.6;
      text-align: left;
      color: #f1f5f9;
    }
    .pi-digit-highlight {
      color: #f43f5e;
      font-weight: bold;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      align-items: center;
    }
    .btn {
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: #0284c7;
      color: white;
    }
    .btn-primary:hover {
      background: #0369a1;
    }
    .btn-success {
      background: #10b981;
      color: white;
    }
    .btn-success:hover {
      background: #059669;
    }
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    .btn-danger:hover {
      background: #dc2626;
    }
    .btn-secondary {
      background: #475569;
      color: white;
    }
    .btn-secondary:hover {
      background: #334155;
    }
    .speed-control {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0f172a;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #334155;
      font-size: 0.9rem;
    }
    .speed-control input {
      width: 100px;
      accent-color: #38bdf8;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Generador Infinito de Pi (π)</h1>
    <p class="subtitle">Calcula decimales en tiempo real de forma matemática ilimitada</p>

    <div class="stats-container">
      <div class="stat-box">
        <div class="stat-value" id="counter">0</div>
        <div class="stat-label">Decimales</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="speed-display">100 ms</div>
        <div class="stat-label">Intervalo</div>
      </div>
    </div>

    <div class="pi-display-wrapper" id="pi-container">
      <span id="pi-text">3</span>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="btn-add">+1 Decimal</button>
      <button class="btn btn-success" id="btn-autoclick">Iniciar Autoclicker</button>
      <button class="btn btn-secondary" id="btn-reset">Reiniciar</button>

      <div class="speed-control">
        <label for="speed-range">Velocidad:</label>
        <input type="range" id="speed-range" min="10" max="1000" step="10" value="100">
      </div>
    </div>
  </div>

  <script>
    // Generator for Digits of Pi using Gibbons' Spigot Algorithm (BigInt)
    function* piSpigot() {
      let q = 1n, r = 18n, t = 1n, k = 1n, n = 3n, l = 3n;
      while (true) {
        if (4n * q + r - t < n * t) {
          yield Number(n);
          let nr = 10n * (r - n * t);
          n = 10n * (3n * q + r) / t - 10n * n;
          q = 10n * q;
          r = nr;
        } else {
          let nr = (2n * q + r) * l;
          let nn = (q * (7n * k) + 2n + r * l) / (t * l);
          q = q * k;
          t = t * l;
          l = l + 2n;
          k = k + 1n;
          n = nn;
          r = nr;
        }
      }
    }

    let generator = piSpigot();
    // First digit is 3
    generator.next(); 

    let decimalCount = 0;
    let piString = "3";
    let autoClickInterval = null;

    const piContainer = document.getElementById("pi-container");
    const piText = document.getElementById("pi-text");
    const counterDisplay = document.getElementById("counter");
    const btnAdd = document.getElementById("btn-add");
    const btnAutoClick = document.getElementById("btn-autoclick");
    const btnReset = document.getElementById("btn-reset");
    const speedRange = document.getElementById("speed-range");
    const speedDisplay = document.getElementById("speed-display");

    function addNextDecimal() {
      const nextDigit = generator.next().value;
      if (decimalCount === 0) {
        piString += ".";
      }
      decimalCount++;
      piString += nextDigit;

      piText.innerText = piString;
      counterDisplay.innerText = decimalCount.toLocaleString();

      // Auto scroll to end
      piContainer.scrollTop = piContainer.scrollHeight;
    }

    function toggleAutoclicker() {
      if (autoClickInterval) {
        // Stop
        clearInterval(autoClickInterval);
        autoClickInterval = null;
        btnAutoClick.innerText = "Iniciar Autoclicker";
        btnAutoClick.className = "btn btn-success";
      } else {
        // Start
        const speed = parseInt(speedRange.value);
        autoClickInterval = setInterval(addNextDecimal, speed);
        btnAutoClick.innerText = "Detener Autoclicker";
        btnAutoClick.className = "btn btn-danger";
      }
    }

    btnAdd.addEventListener("click", () => {
      addNextDecimal();
    });

    btnAutoClick.addEventListener("click", () => {
      toggleAutoclicker();
    });

    speedRange.addEventListener("input", (e) => {
      const speed = e.target.value;
      speedDisplay.innerText = speed + " ms";
      if (autoClickInterval) {
        // Restart interval with new speed
        clearInterval(autoClickInterval);
        autoClickInterval = setInterval(addNextDecimal, speed);
      }
    });

    btnReset.addEventListener("click", () => {
      if (autoClickInterval) {
        toggleAutoclicker();
      }
      generator = piSpigot();
      generator.next();
      decimalCount = 0;
      piString = "3";
      piText.innerText = piString;
      counterDisplay.innerText = "0";
    });
  </script>
</body>
</html>
